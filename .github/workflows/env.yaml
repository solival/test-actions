name: Test environment variables in actions
on: [workflow_dispatch]
env:
  MONGODB_DB_NAME: test_db
jobs:
  test:
    env:
      MONGODB_PASSWORD: ${{ secrets.MONGODB_PASSWORD }}
      MONGODB_USER: test_user
      MONGODB_CLUSTER_ADDRESS: cluster0.mongodb.net
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
      - name: Install dependencies
        run: |
          echo "Installing dependencies for env-app"
          cd third-app
          npm ci
      - name: Run server
        run: |
          echo "Running server for env-app"
          cd third-app
          npm start & npx wait-on http://localhost:3000
      - name: Run tests
        env:
          API_URL: https://api.example.com
          AUTH_TOKEN: ${{ secrets.AUTH_TOKEN }}
        run: |
          echo "Running tests for env-app"
          cd third-app
          npm run test-env